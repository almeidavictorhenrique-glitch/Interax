<!DOCTYPE html> <!-- Define o tipo do documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma da página como português do Brasil -->
<head>
<meta charset="UTF-8"> <!-- Permite acentuação e caracteres especiais -->

<style>

/* ===== ESTILO GERAL DO SITE ===== */
body {
  font-family: 'Times New Roman', Times, serif; /* Define a fonte do site */
  
  /* Fundo com imagem + camada escura (overlay) */
  background: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), /* escurece o fundo */
    url("imagens/fundozoo.jpg") no-repeat center center fixed; /* imagem centralizada e fixa */
  
  background-size: cover; /* Faz a imagem ocupar toda a tela */
  color: white; /* Cor do texto */
  text-align: center; /* Centraliza textos */
  margin: 0; /* Remove margens padrão do navegador */
}

/* ===== CONTROLE DAS TELAS ===== */
.tela {
  display: none; /* Esconde todas as telas por padrão */
  height: 100vh; /* Altura total da tela */
  overflow-y: auto; /* Permite rolagem vertical se necessário */
  padding: 30px; /* Espaçamento interno */
}

/* Tela ativa (visível) */
.ativa {
  display: flex; /* Usa flexbox */
  flex-direction: column; /* Organiza em coluna */
  justify-content: center; /* Centraliza verticalmente */
  align-items: center; /* Centraliza horizontalmente */
  height: 100vh;
  animation: fade 0.5s ease-in; /* Animação de entrada */
}

/* Ajuste específico da tela de pergunta */
#pergunta {
  justify-content: flex-start; /* Começa do topo */
  padding-top: 40px;
}

/* Espaço abaixo do input */
#pergunta input {
  margin-bottom: 20px;
}

/* ===== TÍTULOS ===== */
.tela h1 {
  font-size: 100px; /* Tamanho grande */
  font-weight: bold;
  text-shadow: 3px 3px 15px rgba(0,0,0,0.5); /* Sombra no texto */
  margin-bottom: 30px;
}

/* Título menor na tela de pergunta */
#pergunta h1 {
  font-size: 50px;
}

/* ===== LAYOUT PRINCIPAL ===== */
.layout {
  display: flex; /* Divide a tela em lateral + conteúdo */
  width: 100%;
}

/* layout mapa*/

.mapa-container {
  position: relative;
  display: inline-block;

}

#mapaBase {
  width: 700px;
}

#marcador {
  position: absolute;
  width: 0;
  height: 0;

  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-top: 25px solid #ff0404;

  transform: translate(-50%, -50%);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}


/* ===== SIDEBAR ===== */
.sidebar {
  width: 250px; /* Largura fixa */
  background: rgba(0,0,0,0.7); /* Fundo escuro transparente */
  height: 100vh;
  padding: 20px;
}

/* ===== CARDS DE ANIMAIS ===== */
.card {
  background: white;
  color: #1b5e20;
  margin: 15px 0;
  border-radius: 12px;
  cursor: pointer; /* Mostra que é clicável */
  overflow: hidden;
  transition: 0.3s; /* Animação suave */
}

/* Imagem dentro do card */
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover; /* Ajusta a imagem sem distorcer */
}

/* Nome do animal */
.card span {
  display: block;
  padding: 10px;
  font-weight: bold;
  text-align: center;
}

/* Efeito ao passar o mouse */
.card:hover {
  transform: scale(1.05);
}

/* ===== CONTEÚDO CENTRAL ===== */
.conteudo {
  flex: 1; /* Ocupa o restante da tela */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ===== POPUP ===== */
.popup {
  position: fixed; /* Fica fixo na tela */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7); /* Fundo escuro */
  display: none; /* Inicialmente escondido */
  justify-content: center;
  align-items: center;
}

/* Caixa do popup */
.popup-box {
  background: white;
  color: #1b5e20;
  padding: 40px;
  border-radius: 20px;
  width: 60%;
  font-size: 30px;
  text-align: center;
  animation: zoom 0.3s ease; /* Animação */
}

/* Animação de zoom */
@keyframes zoom {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ===== BOTÕES ===== */
button {
  padding: 20px 30px;
  font-size: 20px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(135deg, #ffffff, #c8e6c9);
  color: #1b5e20;
  cursor: pointer;
  transition: 0.3s;
  min-width: 180px;
}

/* Efeito hover */
button:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* Agrupamento de botões */
.botoes {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* Campo de texto */
input {
  padding: 20px;
  width: 500px;
  font-size: 26px;
  border-radius: 12px;
}

/* Animação de entrada */
@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- ===== TELA INICIAL ===== -->
<div id="home" class="tela ativa">
  <h1>Quer conhecer os animais?</h1>

  <div class="botoes">
    <button onclick="irPara('idioma')">Explorar animais</button>
    <button onclick="irPara('mapa')">🗺️ Ver mapa</button>
  </div>

</div>

<!-- ===== TELA DE IDIOMA ===== -->
<div id="idioma" class="tela">
  <h1>Escolha o idioma</h1>
  <div class="botoes">
    <button onclick="setIdioma('pt')">Português</button>
    <button onclick="setIdioma('en')">English</button>
  </div>
</div>

<!-- TELA DO MAPA -->
<div id="mapa" class="tela">

  <h1>Mapa do Zoológico</h1>

  <div class="mapa-container">
    <img src="imagens/mapa.jpg" id="mapaBase">
    <div id="marcador"></div>
  </div>

  <br><br>
<button onclick="voltarPergunta()">⬅ Voltar</button>
</div>
<!-- ===== TELA PRINCIPAL ===== -->
<div id="pergunta" class="tela">

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Animais</h2>

      <!-- Cada card chama uma função -->
      <div class="card" onclick="selecionarAnimal('leão')">
        <img src="imagens/leao.jpg">
        <span>Leão</span>
      </div>

      <div class="card" onclick="selecionarAnimal('elefante')">
        <img src="imagens/elefante.jpg">
        <span>Elefante</span>
      </div>

      <div class="card" onclick="selecionarAnimal('girafa')">
        <img src="imagens/girafa.jpg">
        <span>Girafa</span>
      </div>

      <button onclick="irPara('home')">⬅ Voltar</button>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
      <h1>Faça sua pergunta</h1>

      <input id="texto" placeholder="Digite sua pergunta..." />

      <div class="botoes">
        <button onclick="enviar()">Perguntar</button>
        <button onclick="voz()">🎤 Falar</button>
      </div>
    </div>

  </div>

</div>

<!-- ===== POPUP ===== -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="resposta"></p>

    <div class="botoes">
      <button onclick="fecharPopup()">⬅ Voltar</button>
      <button onclick="irParaMapa()">📍 Ver no mapa</button>
    </div>

  </div>
</div>

<script>

/* Define idioma padrão */
let idioma = "pt";

/* Troca de telas */
function irPara(tela){
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(tela).classList.add('ativa');
}

/* Define idioma e vai para tela principal */
function setIdioma(i){
  idioma = i;
  irPara('pergunta');
}

/* Envia pergunta para o backend */
async function enviar(){
  let texto = document.getElementById("texto").value;

  let res = await fetch("http://127.0.0.1:5000/pergunta", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({texto, idioma})
  });

  let data = await res.json();
  
  document.getElementById("resposta").innerText = data.resposta;

  let marcador = document.getElementById("marcador");

// POSIÇÕES NO MAPA
if (texto.toLowerCase().includes("leão")) {
  marcador.style.top = "100px";
  marcador.style.left = "200px";
}
else if (texto.toLowerCase().includes("elefante")) {
  marcador.style.top = "100px";
  marcador.style.left = "500px";
}
else if (texto.toLowerCase().includes("girafa")) {
  marcador.style.top = "300px";
  marcador.style.left = "600px";
}
  document.getElementById("popup").style.display = "flex";

  let msg = new SpeechSynthesisUtterance(data.resposta);
  msg.lang = "pt-BR";
  speechSynthesis.speak(msg);
}

function irParaMapa(){
  fecharPopup();      // 👈 fecha o popup
  irPara('mapa');     // 👈 vai pro mapa

 // força reposicionar depois que o mapa aparece
  let marcador = document.getElementById("marcador");
  marcador.style.display = "block"; 
}

/* Fecha popup */
function fecharPopup(){
  document.getElementById("popup").style.display = "none";
}

/* Placeholder para voz futura */
function voz(){
  alert("Vamos ativar a voz no próximo passo");
}

/* Clica no animal e envia automaticamente */
function selecionarAnimal(animal){
  document.getElementById("texto").value = animal;
  enviar();
}

function voltarPergunta(){
  // fecha popup
  let popup = document.getElementById("popup");
  if (popup) popup.style.display = "none";

  // vai pra tela pergunta
  irPara('pergunta');
}

/* Fecha popup clicando fora */
window.onclick = function(event) {
  let popup = document.getElementById("popup");
  if (event.target === popup) {
    popup.style.display = "none";
  }
}

</script>
</body>
</html>
