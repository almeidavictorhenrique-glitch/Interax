<!DOCTYPE html> <!-- Define o tipo do documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma da página como português do Brasil -->
<head>
<meta charset="UTF-8"> <!-- Permite acentuação e caracteres especiais -->

<style>

/* ===== ESTILO GERAL DO SITE ===== */
body {
  font-family: 'Times New Roman', Times, serif; /* Define a fonte do site */
  
  /* Fundo com imagem + camada escura (overlay) */
  background: 
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), /* escurece o fundo */
    url("static/Imagens/fundozoo.jpg") no-repeat center center fixed; /* imagem centralizada e fixa */
  
  background-size: cover; /* Faz a imagem ocupar toda a tela */
  color: white; /* Cor do texto */
  text-align: center; /* Centraliza textos */
  margin: 0; /* Remove margens padrão do navegador */
}

#inicio {
  justify-content: center;
  align-items: center;
}
@keyframes pulseBotao {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
  }

  50% {
    transform: scale(1.05);
    box-shadow: 0 0 20px 10px rgba(76, 175, 80, 0.2);
  }

  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
  }
}

#btnIniciar {
  width: 400px;
  height: 150px;
  font-size: 40px;
  font-weight: bold;
  border-radius: 25px;
  background: linear-gradient(135deg, #ff9800, #ff5722);
  color: white;

  animation: pulseBotao 1.5s infinite;
  box-shadow: 0 0 20px rgba(255, 87, 34, 0.6);
}
.btn-inicio-fixo {
  position: fixed;
  bottom: 30px;
  right: 30px;

  width: 120px;
  height: 60px;

  border-radius: 15px;
  background: linear-gradient(135deg,  #ff9800, #ff5722);
  color: white;
  font-size: 16px;

  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  z-index: 999; /* garante que fica acima de tudo */
}


/* ===== CONTROLE DAS TELAS ===== */
.tela {
  display: none; /* Esconde todas as telas por padrão */
  height: 100vh; /* Altura total da tela */
  overflow-y: auto; /* Permite rolagem vertical se necessário */
  padding: 30px; /* Espaçamento interno */
}

/* Tela ativa (visível) */
.tela.ativa {
  display: flex; /* Usa flexbox */
  flex-direction: column; /* Organiza em coluna */
  justify-content: center; /* Centraliza verticalmente */
  align-items: center; /* Centraliza horizontalmente */
  height: 100vh;
  animation: fade 0.5s ease-in; /* Animação de entrada */
}

.inicio-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px; /* espaço entre leão e botão */
}

@keyframes balanco {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(3deg); }
  100% { transform: rotate(0deg); }
}

.mascote {
 width: 900px;
 max-width: 30vw;
 animation: balanco 2s infinite;
}

/* Ajuste específico da tela de pergunta */
#pergunta {
  justify-content: flex-start; /* Começa do topo */
  padding-top: 40px;
}

/* Espaço abaixo do input */
#pergunta input {
  margin-bottom: 20px;
}

/* ===== TÍTULOS ===== */
.tela h1 {
  font-size: 100px; /* Tamanho grande */
  font-weight: bold;
  text-shadow: 3px 3px 15px rgba(0,0,0,0.5); /* Sombra no texto */
  margin-bottom: 30px;
}

/* Título menor na tela de pergunta */
#pergunta h1 {
  font-size: 50px;
}

/* ===== LAYOUT PRINCIPAL ===== */
.layout {
  display: flex; /* Divide a tela em lateral + conteúdo */
  width: 100%;
}

/* layout mapa*/

.mapa-container {
  position: relative;
  display: inline-block;

}

#mapaBase {
  width: 700px;
}

#marcador {
  position: absolute;
  width: 0;
  height: 0;

  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-top: 25px solid #ff0404;

  transform: translate(-50%, -50%);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}


/* ===== SIDEBAR ===== */
.sidebar {
  width: 250px; /* Largura fixa */
  background: rgba(0,0,0,0.7); /* Fundo escuro transparente */
  height: 100vh;
  padding: 20px;
}

/* ===== CARDS DE ANIMAIS ===== */
.card {
  background: white;
  color: #1b5e20;
  margin: 15px 0;
  border-radius: 12px;
  cursor: pointer; /* Mostra que é clicável */
  overflow: hidden;
  transition: 0.3s; /* Animação suave */
}

/* Imagem dentro do card */
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover; /* Ajusta a imagem sem distorcer */
}

/* Nome do animal */
.card span {
  display: block;
  padding: 10px;
  font-weight: bold;
  text-align: center;
}

/* Efeito ao passar o mouse */
.card:hover {
  transform: scale(1.05);
}

/* ===== CONTEÚDO CENTRAL ===== */
.conteudo {
  flex: 1; /* Ocupa o restante da tela */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ===== POPUP ===== */
.popup {
  position: fixed; /* Fica fixo na tela */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7); /* Fundo escuro */
  display: none; /* Inicialmente escondido */
  justify-content: center;
  align-items: center;
}

/* Caixa do popup */
.popup-box {
  background: white;
  color: #1b5e20;
  padding: 40px;
  border-radius: 20px;
  width: 60%;
  font-size: 30px;
  text-align: center;
  max-height: 80vh;      /* 👈 LIMITA ALTURA */
  overflow-y: auto;      /* 👈 ATIVA SCROLL */
  animation: zoom 0.3s ease; /* Animação */
}

/* Animação de zoom */
@keyframes zoom {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ===== BOTÕES ===== */
button {
  padding: 20px 30px;
  font-size: 20px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(135deg, #ffffff, #c8e6c9);
  color: #1b5e20;
  cursor: pointer;
  transition: 0.3s;
  min-width: 180px;
}

/* Efeito hover */
button:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* Agrupamento de botões */
.botoes {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* Campo de texto */
input {
  padding: 20px;
  width: 500px;
  font-size: 26px;
  border-radius: 12px;
}

.btn-idioma img {
  width: 60px;
  height: 40px;
  object-fit: cover;
  border-radius: 5px;
}
.btn-idioma {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* Animação de entrada */
@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
/* ===== BOTÕES DA HOME ===== */
.botoes-home {
  display: flex;
  gap: 40px;
  margin-top: 40px;
}

.botoes-home button {
  width: 300px;
  height: 120px;
  font-size: 28px;
  border-radius: 20px;
  font-weight: arial;

  background: linear-gradient(135deg, #ffffff, #a5d6a7);
  color: #1b5e20;

  display: flex;
  align-items: center;
  justify-content: center;
}

.botoes-home button:hover {
  transform: scale(1.08);
}
@keyframes ganhar {
  0% { transform: scale(0.5); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.voucher-animado {
  animation: ganhar 0.5s ease;
}

@keyframes piscar {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); color: #2e7d32; }
  100% { transform: scale(1); }
}

.ganhou-texto {
  font-size: 26px;
  font-weight: bold;
  color: #1b5e20;
  animation: piscar 0.8s infinite;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.voucher-animado {
  animation: pop 0.4s ease;
}

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!--<script src="/static/script.js"></script>-->
<body>

<!--TELA INICIAL-->
<div id="inicio" class="tela ativa">

  <div class="inicio-container">

<img src="/static/Imagens/avatar.jpg.png" class="mascote">    
<button onclick="iniciarSistema()" id="btnIniciar">
      INICIAR
    </button>

  </div>

  <audio id="audioBoasVindas">
    <source src="/static/audio/boasvindas.mp3.mp3" type="audio/mpeg">
  </audio>

</div>

<!-- ===== TELA DE IDIOMA ===== -->
<div id="idioma" class="tela">
  <h1 data-key="idioma"></h1>

  <div class="botoes">
  <button onclick="setIdioma('pt')" class="btn-idioma">
    <img src="/static/Imagens/br.png">
    Português
  </button>

  <button onclick="setIdioma('en')" class="btn-idioma">
    <img src="/static/Imagens/eua.png">
    English
  </button>
 </div>
</div>
<!-- ===== TELA DE INTERAÇÕES ===== -->
<div id="interacoes" class="tela">
  <h1 data-key="homeTitulo"></h1>

  <div class="botoes-home">
  <button onclick="irPara('pergunta')">Explorar animais</button>
  <button onclick="irPara('mapa')">Ver mapa</button>
  </div>
</div>
<!-- ===== TELA DO MAPA ===== -->
<div id="mapa" class="tela">

  <h1 data-key="mapaTitulo"></h1>

  <div class="mapa-container">
    <img src="/static/Imagens/mapa.jpg" id="mapaBase">
    <div id="marcador"></div>
  </div>

  <br><br>
  <button onclick="voltarPergunta()" data-key="voltar"></button>
</div>

<!-- ===== TELA DE PERGUNTA ===== -->
<div id="pergunta" class="tela">

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2 data-key="animais"></h2>

      <div class="card" onclick="selecionarAnimal('leão')">
        <img src="/static/Imagens/leao.jpg">
        <span data-key="leao"></span>
      </div>

      <div class="card" onclick="selecionarAnimal('elefante')">
        <img src="/static/Imagens/elefante.jpg">
        <span data-key="elefante"></span>
      </div>

      <div class="card" onclick="selecionarAnimal('girafa')">
        <img src="/static/Imagens/girafa.jpg">
        <span data-key="girafa"></span>
      </div>

      <button onclick="irPara('interacoes')" data-key="voltar"></button>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
      <h1 data-key="pergunta"></h1>

      <input id="texto" data-key="placeholder" placeholder="" />

      <div class="botoes">
        <button onclick="enviar()" data-key="perguntar"></button>

        <!-- 🎤 BOTÃO DE VOZ PRINCIPAL -->
        <button onclick="iniciarVoz()" style="font-size: 20px; padding: 15px;">
          🎤 Falar
        <button onclick="irPara('inicio')" class="btn-inicio-fixo">🏠 Início</button>        </button>
      </div>
    </div>

  </div>

</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard" class="tela">
  <h1>📊 Dashboard</h1>

  <div class="botoes">
    <button onclick="carregarStats()">Atualizar</button>
    <button onclick="irPara('interacoes')">⬅ Voltar</button>
  </div>

  <div style="margin-top:30px; font-size:24px;">
    <p>Total de vouchers: <strong id="total">0</strong></p>
    <p>Usados: <strong id="usados">0</strong></p>
    <p>Disponíveis: <strong id="disponiveis">0</strong></p>
  </div>

  <div style="margin-top:30px;">
    <canvas id="grafico" width="300" height="300"></canvas>
  </div>
</div>

<!-- ===== POPUP ===== -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="resposta"></p>

    <audio id="audio"></audio>

    <div class="botoes">
      <button onclick="fecharPopup()" data-key="voltar"></button>
      <button onclick="irParaMapa()" data-key="verMapa"></button>
      <p id="voucher" style="color: rgb(20, 20, 20); font-size: 24px;"></p>
    </div>

  </div>
</div>

<script>

const traducoes = {
  pt: {
    homeTitulo: "Quer conhecer os animais?",
    explorar: "Explorar animais",
    mapa: "🗺️ Ver mapa",
    idioma: "Escolha o idioma",
    mapaTitulo: "Mapa do Zoológico",
    voltar: "⬅ Voltar",
    animais: "Animais",
    pergunta: "Faça sua pergunta",
    placeholder: "Digite sua pergunta...",
    perguntar: "Perguntar",
    falar: "🎤 Falar",
    verMapa: "📍 Ver no mapa",

    leao: "Leão",
    elefante: "Elefante",
    girafa: "Girafa"
  },

  en: {
    homeTitulo: "Do you want to meet the animals?",
    explorar: "Explore animals",
    mapa: "🗺️ View map",
    idioma: "Choose your language",
    mapaTitulo: "Zoo Map",
    voltar: "⬅ Back",
    animais: "Animals",
    pergunta: "Ask your question",
    placeholder: "Type your question...",
    perguntar: "Ask",
    falar: "🎤 Speak",
    verMapa: "📍 View on map",

    leao: "Lion",
    elefante: "Elephant",
    girafa: "Giraffe"
  }
};

/* Define idioma padrão */
let idioma = "pt";
function setIdioma(i){
  idioma = i;
  traduzirTela();
  irPara('interacoes'); // ou 'homeMenu' se quiser separar depois
}

/* Define idioma e vai para tela principal */
function traduzirTela() {
  const t = traducoes[idioma];

  document.querySelectorAll("[data-key]").forEach(el => {
    const key = el.getAttribute("data-key");

    if (el.tagName === "INPUT") {
      el.placeholder = t[key];
    } else {
      el.innerText = t[key];
    }
  });

}

function tocarAudioInicio() {
  const audio = document.getElementById("audioBoasVindas");

  if(audio){
    audio.currentTime = 0;

    audio.play()
      .then(() => console.log("Áudio tocando"))
      .catch(err => console.log("Erro ao tocar:", err));
  }
}

function iniciarSistema(){
  tocarAudioInicio();
  irPara('idioma');
}

/* Troca de telas */
function irPara(tela){
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));

  const destino = document.getElementById(tela);

  if(destino){
    destino.classList.add('ativa');
    console.log("Indo para:", tela);

  if(tela === "inicio"){
      tocarAudioInicio();
   }
 }
}

/* Envia pergunta para o backend */
async function enviar(){
  let texto = document.getElementById("texto").value;

  try {
    let res = await fetch("/pergunta", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({texto, idioma})
    });

    let data = await res.json();
    console.log(data);

    document.getElementById("resposta").innerText = data.resposta;

    // 🎟️ VOUCHER
    let descricao = "loja do zoológico 🛍️";

if (data.tipo === "pelucia_leao") {
    descricao = "pelúcia do leão 🦁";
}
else if (data.tipo === "pelucia_elefante") {
    descricao = "pelúcia do elefante 🐘";
}
else if (data.tipo === "pelucia_girafa") {
    descricao = "pelúcia da girafa 🦒";
}
else if (data.tipo === "comida") {
    descricao = "restaurante 🍔";
}
    document.getElementById("voucher").innerHTML = `
<div class="voucher-animado" style="
  margin-top:20px;
  padding:15px;
  border-radius:15px;
  border:3px dashed #1976d2;
  background: linear-gradient(135deg, #ffffff, #e3f2fd);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  color:#000;
  text-align:center;
">

  <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">
    🎉 VOCÊ GANHOU! 🎉
  </div>

  <div style="font-size:18px; font-weight:bold; margin-bottom:10px;">
    🎟️ Voucher Especial!
  </div>

  <div style="font-size:16px; margin-bottom:10px;">
    ${data.desconto}% OFF em ${descricao}
  </div>

  <div style="font-size:16px; color:#2e7d32; margin-bottom:10px;">
    ${data.mensagem}
  </div>

  <div style="margin:15px 0;">
    <canvas id="qrcode"></canvas>
  </div>

  <div style="font-size:14px; margin-bottom:5px;">
    Válido até ${data.expira_em}
  </div>

  <div style="
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    color:#1976d2;
    margin-bottom:10px;
  ">
    ${data.voucher}
  </div>

  <div style="font-size:14px;">
    Apresente este código no caixa
  </div>

</div>
`;


   if (data.voucher) {

    confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }

  });
      
      // 📱 QR CODE
      setTimeout(() => {
        let canvas = document.getElementById("qrcode");
        if (canvas) {
          QRCode.toCanvas(canvas, data.voucher);
        }
      }, 100);

    } else {
      document.getElementById("voucher").innerText = "";
    }

  } catch (erro) {
    console.log("ERRO:", erro);

    document.getElementById("resposta").innerText = "Erro ao conectar 😢";
    document.getElementById("voucher").innerText = "";
  }

  // 📍 MAPA
  let marcador = document.getElementById("marcador");

  if (texto.toLowerCase().includes("leão")) {
    marcador.style.top = "100px";
    marcador.style.left = "200px";
  }
  else if (texto.toLowerCase().includes("elefante")) {
    marcador.style.top = "100px";
    marcador.style.left = "500px";
  }
  else if (texto.toLowerCase().includes("girafa")) {
    marcador.style.top = "300px";
    marcador.style.left = "600px";
  }

  document.getElementById("popup").style.display = "flex";

  // 🔊 VOZ
  speechSynthesis.cancel(); // 👈 PARA QUALQUER ÁUDIO ANTES
  let msg = new SpeechSynthesisUtterance(
    document.getElementById("resposta").innerText
  );
  msg.lang = (idioma === "pt") ? "pt-BR" : "en-US";
  speechSynthesis.speak(msg);
}


function irParaMapa(){
  fecharPopup();      // 👈 fecha o popup
  irPara('mapa');     // 👈 vai pro mapa

 // força reposicionar depois que o mapa aparece
  let marcador = document.getElementById("marcador");
  marcador.style.display = "block"; 
}

/* Fecha popup */
function fecharPopup(){
  document.getElementById("popup").style.display = "none";
}

/* Placeholder para voz futura */
function voz(){
  alert("Vamos ativar a voz no próximo passo");
}

/* Clica no animal e envia automaticamente */
function selecionarAnimal(animal){
  document.getElementById("texto").value = animal;
  enviar();
}

function voltarPergunta(){
  // fecha popup
  let popup = document.getElementById("popup");
  if (popup) popup.style.display = "none";

  // vai pra tela pergunta
  irPara('pergunta');
}

/* Fecha popup clicando fora */
window.onclick = function(event) {
  let popup = document.getElementById("popup");
  if (event.target === popup) {
    popup.style.display = "none";
  }
}
// DASHBOARD
async function carregarStats() {
  try {
    let res = await fetch("/stats");
    let data = await res.json();

    console.log(data); // pra testar

    document.getElementById("total").innerText = data.total;
    document.getElementById("usados").innerText = data.usados;
    document.getElementById("disponiveis").innerText = data.disponiveis;

    // 📊 gráfico
    let canvas = document.getElementById("grafico");
    let ctx = canvas.getContext("2d");

// limpa gráfico
    canvas.width = canvas.width;

    new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Usados", "Disponíveis"],
        datasets: [{
          data: [data.usados, data.disponiveis]
        }]
      }
    });

  } catch (erro) {
    console.log("Erro ao carregar stats:", erro);
  }
}

let cliques = 0;

document.addEventListener("keydown", function(e){
  if (e.key.toLowerCase() === "d") {
    cliques++;

    if (cliques >= 3) {
      irPara('dashboard');
      carregarStats();
      cliques = 0;
    }
  }
});

traduzirTela();
 
</script>
</body>
</html>
